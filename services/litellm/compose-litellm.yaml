services:
  litellm:
    container_name: litellm
    image: ghcr.io/berriai/litellm:v1.83.14-stable
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
    extra_hosts:
    - "host.docker.internal:host-gateway"
    ports:
    - ${VLLM_PORT:-4000}:4000
    volumes:
    - ./litellm-config.yaml:/app/config.yaml
    environment:
    - PROMETHEUS_MONITORING=True
    - OTEL_TRACES_EXPORTER=otlp
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
    - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    - OTEL_SERVICE_NAME=litellm
    - OTEL_ATTRIBUTE_VALUE_LENGTH_LIMIT=131072
    - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-}
    - LITELLM_LOG=DEBUG
    - LITELLM_FORWARD_TRACEPARENT_TO_LLM_PROVIDER=True
    command:
    - --config
    - /app/config.yaml
    networks:
    - vllm-network
    - spark-stack-net
networks:
  vllm-network:
    external: true
  spark-stack-net:
    external: true
