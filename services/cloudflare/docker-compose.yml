services:
  tunnel:
    image: cloudflare/cloudflared:2026.3.0
    container_name: cloudflared
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    networks:
      - spark-stack-net
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  spark-stack-net:
    external: true
