services:
  prometheus:
    image: quay.io/prometheus/prometheus:v3.11.3
    container_name: prometheus
    user: root
    ports:
    - 9090:9090
    networks:
    - monitoring
    - proxy-tier
    - vllm-network
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - ../../current/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ../../current/targets.json:/etc/prometheus/targets.json:ro
    - prometheus_data:/prometheus
    - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --web.console.libraries=/etc/prometheus/console_libraries
    - --web.console.templates=/etc/prometheus/consoles
    - --web.enable-otlp-receiver
    - --web.enable-remote-write-receiver
    restart: unless-stopped
    env_file:
    - ../../.env
    deploy:
      resources:
        limits:
          memory: 2G
  alloy:
    image: grafana/alloy:v1.16.0
    container_name: alloy
    ports:
    - 12345:12345
    - 8125:8125
    - 4317:4317
    - 4318:4318
    command:
    - run
    - --server.http.listen-addr=0.0.0.0:12345
    - /etc/alloy/config.alloy
    volumes:
    - ./config.alloy:/etc/alloy/config.alloy:ro
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - /sys/fs/cgroup:/sys/fs/cgroup:ro
    - /var/lib/docker/:/var/lib/docker:ro
    - /dev/disk/:/dev/disk:ro
    networks:
    - monitoring
    - proxy-tier
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04
    container_name: dcgm-exporter
    restart: unless-stopped
    privileged: true
    cap_add:
    - SYS_ADMIN
    environment:
    - DCGM_EXPORTER_INTERVAL=5000
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    networks:
    - monitoring

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
    - 3001:3000
    extra_hosts:
    - host.docker.internal:host-gateway
    environment:
    - GF_AUTH_TOKEN_ROTATION_INTERVAL_MINUTES=43200
    - GF_NEWS_NEWS_FEED_ENABLED=false
    - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    - GF_USERS_ALLOW_SIGN_UP=false
    - GF_SERVER_ENABLE_GZIP=true
    - GF_LOG_LEVEL=warn
    - GF_FEATURE_TOGGLES_PROVISIONING=true
    - GF_FEATURE_TOGGLES_GRAFANAASSISTANT=true
    - GF_ASSISTANT_ENABLED=true
    # renovate: datasource=github-releases depName=grafana/grafana-polystat-panel
    - GF_POLYSTAT_VERSION=2.1.16
    # renovate: datasource=github-releases depName=VolkovLabs/business-text
    - GF_DYNAMICTEXT_VERSION=6.1.0
    - GF_INSTALL_PLUGINS=grafana-polystat-panel ${GF_POLYSTAT_VERSION},marcusolsson-dynamictext-panel ${GF_DYNAMICTEXT_VERSION}
    - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/overview.json
    volumes:
    - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    - grafana_data:/var/lib/grafana
    networks:
    - monitoring
    - proxy-tier
    restart: unless-stopped
    env_file:
    - ../../.env
    depends_on:
    - prometheus
    deploy:
      resources:
        limits:
          memory: 512M

  vllm-progress-manager:
    build:
      context: ../..
      dockerfile: services/monitoring/vllm-progress/docker/Dockerfile.vllm-progress
    container_name: vllm-progress-manager
    extra_hosts:
    - host.docker.internal:host-gateway
    ports:
    - 8126:8126
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
    - monitoring
    - proxy-tier
    restart: unless-stopped
    depends_on:
    - alloy
    environment:
    - SPARKRUN_STATSD_HOST=alloy
  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.28.0
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
    - 9115:9115
    command:
    - --config.file=/etc/blackbox_exporter/config.yml
    networks:
    - monitoring
  tempo:
    image: grafana/tempo:2.10.2
    container_name: tempo
    user: root
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "127.0.0.1:3200:3200"
    networks:
      - monitoring
      - proxy-tier
    restart: unless-stopped

networks:
  monitoring:
    driver: bridge
  proxy-tier:
    external: true
  vllm-network:
    name: vllm-network
    external: true
volumes:
  prometheus_data: null
  grafana_data: null
  tempo_data: null
