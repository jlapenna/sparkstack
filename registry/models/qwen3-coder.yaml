recipe_version: '2'
model: Intel/Qwen3-Coder-Next-int4-AutoRound
runtime: vllm
builder: eugr
max_nodes: 1
container: vllm-node-latest
metadata:
  description: Qwen3-Coder-Next-int4-AutoRound adapted from https://spark-arena.com/api/recipes/0c3705c9-8e54-45a0-acca-3d58f1f703a7/raw
defaults:
  host: 0.0.0.0
  port: 8000
  tensor_parallel: 1
  max_model_len: 262144
  gpu_memory_utilization: 0.85
  attention_backend: flashinfer
  tool_call_parser: qwen3_coder
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
command: |
  vllm serve {model} \
  --max-model-len {max_model_len} \
  --gpu-memory-utilization {gpu_memory_utilization} \
  -tp {tensor_parallel} \
  --port {port} \
  --host {host} \
  --load-format fastsafetensors \
  --enable-prefix-caching \
  --attention-backend {attention_backend} \
  --enable-auto-tool-choice \
  --tool-call-parser {tool_call_parser}

litellm_overrides:
  thinking_format: qwen-chat-template
  min_p: 0.1
  presence_penalty: 0.0
  frequency_penalty: 0.0
  stop_token_ids: [151643, 151644, 151645]
