recipe_version: '1'
model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
runtime: sglang
builder: eugr
max_nodes: 1
container: lmsysorg/sglang:nightly-dev-cu13-20260401-b6fe0cca
solo_only: true
metadata:
  description: SGLang serving Nemotron-3-Super-120B NVFP4 on Blackwell WITHOUT Speculative Decoding.
hardware:
  memory_limit: 80G
defaults:
  port: 8001
  host: 0.0.0.0
  tensor_parallel: 1
  expert_parallel: 1
  gpu_memory_utilization: 0.85
  max_model_len: 262144
  dtype: bfloat16
  attention_backend: flashinfer
  kv_cache_dtype: fp8_e5m2
  reasoning_parser: nemotron_3
  tool_call_parser: qwen3_coder
command: |
  export SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN=1
  export SGLANG_USE_FLASHINFER_MOE_FP4=1
  python3 -m sglang.launch_server \
    --model-path {model} \
    --context-length {max_model_len} \
    --mem-fraction-static {gpu_memory_utilization} \
    --tp-size {tensor_parallel} \
    --ep-size {expert_parallel} \
    --dtype {dtype} \
    --host {host} \
    --port {port} \
    --attention-backend {attention_backend} \
    --kv-cache-dtype {kv_cache_dtype} \
    --reasoning-parser {reasoning_parser} \
    --tool-call-parser {tool_call_parser} \
    --trust-remote-code \
    --disable-radix-cache \
    --disable-cuda-graph \
    --disable-piecewise-cuda-graph

litellm_overrides:
  thinking_format: openai
