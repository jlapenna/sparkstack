recipe_version: '1'
model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
runtime: vllm-distributed
builder: eugr
max_nodes: 1
container: vllm-node
solo_only: true
metadata:
  description: vLLM serving Nemotron-3-Super-120B NVFP4 on a SINGLE NODE ONLY!
defaults:
  port: 8001
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.70
  max_model_len: 65536
command: |
  vllm serve nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4  \
     --moe-backend cutlass \
     --max-model-len {max_model_len} \
     --port {port} --host {host} \
     --trust-remote-code \
     --enable-auto-tool-choice  \
     --tool-call-parser qwen3_coder \
     --reasoning-parser super_v3  \
     --reasoning-parser-plugin /cache/huggingface/super_v3_reasoning_parser.py  \
     --kv-cache-dtype auto  \
     --quantization nvfp4 \
     --enable-prefix-caching  \
     --attention-backend TRITON_ATTN \
     --max-num-seqs 512 \
     --gpu-memory-utilization {gpu_memory_utilization}
litellm_overrides:
  thinking_format: openai
