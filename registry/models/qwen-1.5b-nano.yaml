recipe_version: '1'
model: Qwen/Qwen2.5-Coder-1.5B-Instruct
runtime: vllm-distributed
builder: eugr
max_nodes: 1
container: vllm-node
solo_only: true
hardware:
  memory_limit: 4G
defaults:
  port: 8003
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.05
  max_model_len: 32768
command: |
  vllm serve {model} \
     --port {port} --host {host} \
     --gpu-memory-utilization {gpu_memory_utilization} \
     --max-model-len {max_model_len} \
     --trust-remote-code \
     --enforce-eager

litellm_overrides:
  min_p: 0.1
  presence_penalty: 0.0
  frequency_penalty: 0.0
  stop_token_ids: [151643, 151644, 151645]
