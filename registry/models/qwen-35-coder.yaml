recipe_version: '1'
model: Qwen/Qwen3.5-35B-A3B-FP8
runtime: sglang
builder: eugr
max_nodes: 1
container: scitrera/dgx-spark-sglang:0.5.9-dev1-329817e2-t5
solo_only: true
metadata:
  description: SGLang serving Qwen3.5-35B-A3B-FP8 on a SINGLE NODE ONLY!
  status: deprecated
  notes: |
    🛑 DEPRECATED: This model was producing gibberish and "falling in on itself" during complex reasoning/section generation.
    Observed behavior: Infinite repetitive looping ("contribute while others don't... linkage bridge link tie bond attachment...").
    We have stopped using this model in the primary stack.
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.75
  max_model_len: 131072
  attention_backend: triton
  fp8_gemm_backend: cutlass
  reasoning_parser: qwen3
  tool_call_parser: qwen3_coder
  speculative_algo: NEXTN
  speculative_eagle_topk: 1
  speculative_num_draft_tokens: 4
  speculative_num_steps: 3
command: |
  python3 -m sglang.launch_server \
    --model-path {model} \
    --context-length {max_model_len} \
    --mem-fraction-static {gpu_memory_utilization} \
    --tp-size {tensor_parallel} \
    --host {host} \
    --port {port} \
    --attention-backend {attention_backend} \
    --reasoning-parser {reasoning_parser} \
    --tool-call-parser {tool_call_parser} \
    --fp8-gemm-backend {fp8_gemm_backend} \
    --speculative-algo {speculative_algo} \
    --speculative-num-steps {speculative_num_steps} \
    --speculative-eagle-topk {speculative_eagle_topk} \
    --speculative-num-draft-tokens {speculative_num_draft_tokens} \
    --trust-remote-code
litellm_overrides:
  thinking_format: qwen-chat-template
  min_p: 0.1
  presence_penalty: 0.0
  frequency_penalty: 0.0
  stop_token_ids: [151643, 151644, 151645]
