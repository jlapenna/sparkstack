services:
  gateway:
    container_name: vllm-gateway
    image: ghcr.io/berriai/litellm:v1.83.7-stable
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    ports:
    - ${VLLM_PORT:-4000}:4000
    volumes:
    - ./litellm-config.yaml:/app/config.yaml
    environment:
    - PROMETHEUS_MONITORING=True
    - OTEL_EXPORTER=otlp
    - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318/v1/traces
    - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    - OTEL_SERVICE_NAME=litellm
    command:
    - --config
    - /app/config.yaml
    networks:
    - vllm-network
    - proxy-tier
networks:
  vllm-network:
    external: true
  proxy-tier:
    external: true
