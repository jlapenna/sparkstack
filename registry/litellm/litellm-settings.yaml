litellm_settings:
  drop_params: True
  pass_through_stream_options: True
  pass_through_headers: ["traceparent", "tracestate"]
  forward_traceparent_to_llm_provider: True
  telemetry: True
  callbacks: ["prometheus", "otel"]
  guardrails: []
  master_key: "${LITELLM_MASTER_KEY:-}"
  request_timeout: 1200
  num_retries: 3
  retry_policy:
    exponential_backoff: True
  connect_timeout: 10
  health_check: True
  openai_developer_role_to_system: True

# Optimization: Enable dynamic configuration monitoring
general_settings:
  reload_config: True
  reload_interval: 10
  always_include_stream_usage: true 
router_settings:
  routing_strategy: simple-shuffle
  enable_pre_call_checks: True

model_list:
  - model_name: main
    litellm_params:
      model: openai/main
      api_base: http://host.docker.internal:8001/v1
