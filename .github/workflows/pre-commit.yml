name: pre-commit

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Checkout sparkrun
        run: git clone https://github.com/spark-arena/sparkrun ../sparkrun
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Run pre-commit
        uses: tox-dev/action-pre-commit-uv@v1
