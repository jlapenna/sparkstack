name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spark-stack
    steps:
      - name: Checkout spark-stack
        uses: actions/checkout@v6
        with:
          path: spark-stack

      - name: Checkout sparkrun
        uses: actions/checkout@v6
        with:
          repository: spark-arena/sparkrun
          path: sparkrun

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: "spark-stack/pyproject.toml"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run pyright
        run: uv run pyright

      - name: Run unit tests
        run: uv run pytest tests/unit/
