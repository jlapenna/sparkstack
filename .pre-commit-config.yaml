default_install_hook_types: [pre-commit, pre-push]
exclude: '^(openclaw/|sparkrun/)'
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        verbose: true
        stages: [pre-push]
      - id: ruff-format
        entry: bash -c 'ruff format --check "$@"' --
        verbose: true
        stages: [pre-push]
  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        entry: bash -c 'mdformat "$@"' --
        verbose: true
        additional_dependencies:
          - mdformat-gfm
        stages: [pre-push]
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
      - id: pyright
        entry: bash -c 'pyright --pythonpath .venv/bin/python "$@"' --
        verbose: true
        args: [ core/, manager/, tests/ ]
        additional_dependencies:
          - pyright
        stages: [pre-push]
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        args: ["--no-color"]
        stages: [pre-commit, pre-push]
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "."]
        additional_dependencies: ["bandit[toml]"]
        stages: [pre-push]