services:
  prometheus:
    image: quay.io/prometheus/prometheus:v3.11.2
    container_name: prometheus
    user: root
    ports:
    - 9090:9090
    networks:
    - monitoring
    - proxy-tier
    - vllm-network
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - ../current/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ../current/targets.json:/etc/prometheus/targets.json:ro
    - prometheus_data:/prometheus
    - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --web.console.libraries=/etc/prometheus/console_libraries
    - --web.console.templates=/etc/prometheus/consoles
    - --web.enable-otlp-receiver
    restart: unless-stopped
    env_file:
    - ../.env
    deploy:
      resources:
        limits:
          memory: 2G
  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    container_name: node-exporter
    restart: unless-stopped
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    command:
    - --path.procfs=/host/proc
    - --path.rootfs=/rootfs
    - --path.sysfs=/host/sys
    - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
    - monitoring
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.2-4.8.1-ubuntu22.04
    container_name: dcgm-exporter
    restart: unless-stopped
    privileged: true
    cap_add:
    - SYS_ADMIN
    environment:
    - DCGM_EXPORTER_INTERVAL=5000
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            count: all
            capabilities:
            - gpu
    networks:
    - monitoring
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    container_name: cadvisor
    restart: unless-stopped
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /run:/run:ro
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    - /dev/disk/:/dev/disk:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - /sys/fs/cgroup:/sys/fs/cgroup:ro
    networks:
    - monitoring
    environment:
    - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.44}
    command:
    - --housekeeping_interval=5s
    - --max_housekeeping_interval=10s
    - --store_container_labels=true
    - --whitelisted_container_labels=openclaw.role,openclaw.monitoring,sparkrun.role,sparkrun.monitoring,com.docker.compose.service
    - --docker_only=true
    - --v=2
    cap_add:
    - SYS_ADMIN
    - SYS_PTRACE
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
    - 3001:3000
    extra_hosts:
    - host.docker.internal:host-gateway
    environment:
    - GF_AUTH_TOKEN_ROTATION_INTERVAL_MINUTES=43200
    - GF_NEWS_NEWS_FEED_ENABLED=false
    - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    - GF_USERS_ALLOW_SIGN_UP=false
    - GF_SERVER_ENABLE_GZIP=true
    - GF_LOG_LEVEL=warn
    - GF_FEATURE_TOGGLES_ENABLE=provisioning,grafanaAssistant
    - GF_ASSISTANT_ENABLED=true
    # renovate: datasource=github-releases depName=grafana/grafana-polystat-panel
    - GF_POLYSTAT_VERSION=2.1.16
    # renovate: datasource=github-releases depName=VolkovLabs/business-text
    - GF_DYNAMICTEXT_VERSION=6.1.0
    - GF_INSTALL_PLUGINS=grafana-polystat-panel ${GF_POLYSTAT_VERSION},marcusolsson-dynamictext-panel ${GF_DYNAMICTEXT_VERSION}
    - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/overview.json
    volumes:
    - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    - grafana_data:/var/lib/grafana
    networks:
    - monitoring
    - proxy-tier
    restart: unless-stopped
    env_file:
    - ../.env
    depends_on:
    - prometheus
    deploy:
      resources:
        limits:
          memory: 512M
  vector:
    image: timberio/vector:0.55.0-distroless-static
    container_name: vector
    user: root
    ports:
    - 8125:8125
    - 9102:9102
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ./vector.yaml:/etc/vector/vector.yaml:ro
    networks:
    - monitoring
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
  vllm-progress-manager:
    build:
      context: ..
      dockerfile: Dockerfile.vllm-progress
    container_name: vllm-progress-manager
    extra_hosts:
    - host.docker.internal:host-gateway
    ports:
    - 8126:8126
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
    - monitoring
    - proxy-tier
    restart: unless-stopped
    depends_on:
    - vector
  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.28.0
    container_name: blackbox-exporter
    restart: unless-stopped
    ports:
    - 9115:9115
    command:
    - --config.file=/etc/blackbox_exporter/config.yml
    networks:
    - monitoring
  tempo:
    image: grafana/tempo:2.10.2
    container_name: tempo
    user: root
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "127.0.0.1:3200:3200"
    networks:
      - monitoring
      - proxy-tier
    restart: unless-stopped

  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.150.1
    container_name: otel-collector
    volumes:
      - ./otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
      - "127.0.0.1:8889:8889"
    networks:
      - monitoring
      - proxy-tier
    restart: unless-stopped
    depends_on:
      - tempo
networks:
  monitoring:
    driver: bridge
  proxy-tier:
    external: true
  vllm-network:
    name: vllm-network
    external: true
volumes:
  prometheus_data: null
  grafana_data: null
  tempo_data: null
