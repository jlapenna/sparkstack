global:
  scrape_interval: 5s
  evaluation_interval: 5s
scrape_configs:
- job_name: vllm-inference
  static_configs:
  - targets:
    - researcher:8000
    - embedding:8000
    - whisper:8000
- job_name: litellm-gateway
  static_configs:
  - targets:
    - vllm-gateway:4000
- job_name: monitoring
  static_configs:
  - targets:
    - cadvisor:8080
    - node-exporter:9100
    - dcgm-exporter:9400
    - otel-collector:8889
    - otel-collector:8888
    - tempo:3200
    - vector:9102
- job_name: blackbox
  metrics_path: /probe
  params:
    module:
    - http_2xx
  static_configs:
  - targets:
    - https://c.jlapenna.net
    - https://m.jlapenna.net
  relabel_configs:
  - source_labels:
    - __address__
    target_label: __param_target
  - source_labels:
    - __param_target
    target_label: instance
  - target_label: __address__
    replacement: blackbox-exporter:9115
