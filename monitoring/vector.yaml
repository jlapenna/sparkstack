sources:
  vllm_logs:
    type: docker_logs
    include_containers: ["sparkrun_.*", "researcher", "embedding", "whisper"]

  vllm_statsd:
    type: statsd
    address: 0.0.0.0:8125
    mode: tcp # SWITCH TO TCP
    dogstatsd: true



sinks:
  prometheus_sink:
    type: prometheus_exporter
    inputs: ["vllm_statsd"]
    address: 0.0.0.0:9102
    default_namespace: vllm
