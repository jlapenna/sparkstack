global:
  scrape_interval: 15s
scrape_configs:
- job_name: vllm
  metrics_path: /metrics
  file_sd_configs:
  - files:
    - /etc/prometheus/targets.json
- job_name: litellm-gateway
  metrics_path: /metrics
  static_configs:
  - targets:
    - 100.64.0.2:4000
    labels:
      instance: spark
- job_name: monitoring
  static_configs:
  - targets:
    - alloy:12345
    - nv-monitor:9101
    labels:
      instance: spark
  metric_relabel_configs:
  - source_labels:
    - __name__
    regex: DCGM_FI_DEV_XID_ERRORS
    action: drop
