global:
  scrape_interval: 5s
scrape_configs:
- job_name: vllm
  static_configs:
  - targets:
    - vllm-gateway:4000
    labels:
      model: gateway
  - targets:
    - host.docker.internal:8001
    labels:
      model: main
- job_name: monitoring
  static_configs:
  - targets:
    - cadvisor:8080
    - node-exporter:9100
    - dcgm-exporter:9400
- job_name: home_local
  file_sd_configs:
  - files:
    - /prometheus/home_local.json
  relabel_configs:
  - target_label: instance
    replacement: home.local
